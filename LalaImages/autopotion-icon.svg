<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5c38"/>
      <stop offset="100%" stop-color="#2d8a56"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="80" fill="url(#bg)"/>
  <!-- Potion bottle -->
  <path d="M210,80 L210,180 L180,250 C180,250 170,300 170,350 C170,410 210,440 250,440 C290,440 330,410 330,350 C330,300 320,250 320,250 L290,180 L290,80 Z" fill="none" stroke="white" stroke-width="12" stroke-linejoin="round"/>
  <!-- Neck -->
  <rect x="210" y="80" width="80" height="30" rx="5" fill="none" stroke="white" stroke-width="10"/>
  <!-- Cork -->
  <rect x="225" y="60" width="50" height="30" rx="8" fill="white" opacity="0.5"/>
  <!-- Liquid level -->
  <path d="M185,290 C185,290 180,330 200,360 L300,360 C320,330 315,290 315,290 Z" fill="white" opacity="0.25"/>
  <!-- Cross/medical symbol -->
  <text x="250" y="340" text-anchor="middle" font-family="sans-serif" font-size="70" font-weight="bold" fill="white" opacity="0.7">+</text>
  <!-- Label -->
  <text x="250" y="460" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="white" opacity="0.6">POTION</text>
</svg>
