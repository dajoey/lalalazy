<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5c38"/>
      <stop offset="100%" stop-color="#2d8a56"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="80" fill="url(#bg)"/>
  <!-- Card shape -->
  <rect x="155" y="100" width="190" height="270" rx="20" fill="none" stroke="white" stroke-width="10"/>
  <!-- Card star/fortune symbols -->
  <text x="250" y="200" text-anchor="middle" font-family="sans-serif" font-size="100" fill="white" opacity="0.8">★</text>
  <!-- Smaller stars -->
  <text x="250" y="300" text-anchor="middle" font-family="sans-serif" font-size="30" fill="white" opacity="0.5">✦   ✦   ✦</text>
  <!-- Mog pom -->
  <circle cx="250" cy="400" r="22" fill="none" stroke="white" stroke-width="6"/>
  <line x1="250" y1="422" x2="250" y2="450" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <text x="250" y="465" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" opacity="0.5">kupo!</text>
</svg>
